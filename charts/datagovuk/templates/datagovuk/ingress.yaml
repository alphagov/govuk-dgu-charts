{{- if or (eq "test" .Values.environment) (eq "integration" .Values.environment) }}
{{- $ephemeralPath := print $.Values.argo_environment ".ephemeral" -}}
{{- $stablePath := print "eks." $.Values.environment -}}
{{- $environmentPath := eq "ephemeral" $.Values.environment | ternary $ephemeralPath $stablePath -}}
{{- with .Values.datagovuk.ingress }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datagovuk
  {{- if not (empty .annotations) }}
  annotations:
    {{- tpl (toYaml .annotations) $ | trim | nindent 4 }}
  {{- end }}
spec:
  {{ if not (empty .ingressClassName) }}
  ingressClassName: {{ .ingressClassName }}
  {{ end }}
  rules:
    - host: datagovuk.{{ $environmentPath }}.govuk.digital
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $.Release.Name }}-datagovuk
                port:
                  number: 8000
{{- end }}. # end with
{{- end }}