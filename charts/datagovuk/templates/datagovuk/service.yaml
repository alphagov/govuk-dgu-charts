apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-datagovuk
spec:
  selector:
    app: {{ $.Release.Name }}-datagovuk
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-datagovuk-directory
spec:
  selector:
    app: {{ $.Release.Name }}-datagovuk-directory
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
