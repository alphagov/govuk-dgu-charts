apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datagovuk
  namespace: cluster-services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    slackChannel: {{ .Values.datagovukHelmValues.slackChannel | quote }}
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: {{ .Values.datagovukHelmValues.slackChannel }}
    notifications.argoproj.io/subscribe.on-sync-failed.slack: {{ .Values.datagovukHelmValues.slackChannel }}
spec:
  project: datagovuk
  source:
    repoURL: https://github.com/alphagov/govuk-dgu-charts
    path: charts/datagovuk
    targetRevision: HEAD
    helm:
      values: |
        argo_environment: {{ .Values.argo_environment }}
        {{- toYaml .Values.datagovukHelmValues | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: datagovuk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true