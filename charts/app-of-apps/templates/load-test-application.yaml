{{- if .Values.loadTestHelmValues }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ndl-load-test
  namespace: cluster-services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: datagovuk
  source:
    repoURL: https://github.com/alphagov/govuk-dgu-charts
    path: charts/ndl-load-test
    targetRevision: {{ .Values.loadTestTargetRevision | default "HEAD" }}
    helm:
      values: |
        {{- toYaml .Values.loadTestHelmValues | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: datagovuk
  # Ignore spec.suspend so ArgoCD does not reset the job back to suspended
  # while the test is running (selfHeal would otherwise overwrite the patch)
  ignoreDifferences:
    - group: batch
      kind: Job
      jsonPointers:
        - /spec/suspend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true
{{- end }}
