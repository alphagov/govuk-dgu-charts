{{- if .Values.loadTestConfig }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ndl-load-test
  namespace: cluster-services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: datagovuk
  source:
    repoURL: https://github.com/alphagov/govuk-dgu-charts
    path: charts/ndl-load-test
    targetRevision: {{ .Values.loadTestTargetRevision | default "HEAD" }}
    helm:
      values: |
        {{- toYaml .Values.loadTestConfig | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: datagovuk
  ignoreDifferences:
    - group: batch
      kind: Job
      jsonPointers:
        - /spec/suspend                                              
        - /spec/template/spec/containers/0/env                      
    - group: v1
      kind: ConfigMap
      name: ndl-load-test-script
      jsonPointers:
        - /data/config.json                                          
        - /data/script.js                                            
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true
{{- end }}
