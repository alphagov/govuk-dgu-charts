{{- if .Values.loadTestHelmValues }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: load-test
  namespace: cluster-services
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: datagovuk
  source:
    repoURL: https://github.com/alphagov/govuk-dgu-charts
    path: charts/load-test
    targetRevision: HEAD
    helm:
      values: |
        {{- toYaml .Values.loadTestHelmValues | nindent 8 }}
  destination:
    server: https://kubernetes.default.svc
    namespace: datagovuk
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - ApplyOutOfSyncOnly=true
    - ServerSideApply=true
{{- end }}
