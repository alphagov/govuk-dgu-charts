{{- $fullName := print .Release.Name "-ckan-efs" -}}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $fullName }}
  labels:
    app: ckan-pv
    app.kubernetes.io/name: {{ $fullName }}
    app.kubernetes.io/component: {{ $fullName }}
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: ckan_outputs.{{ .Values.environment }}.govuk-internal.digital
    path: /output