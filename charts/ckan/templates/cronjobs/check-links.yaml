{{- $fullName := print .Release.Name "-check-links" -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullName }}
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
  labels:
    app.kubernetes.io/arch: {{ default "amd64" .Values.arch }}
spec:
  schedule: "0 0 * * 0"  # At 00:00 on Sunday
  suspend: false
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      name: {{ $fullName }}
      labels:
        app.kubernetes.io/arch: {{ default "amd64" .Values.arch }}
    spec:
      template:
        metadata:
          name: {{ $fullName }}
          labels:
            app.kubernetes.io/arch: {{ default "amd64" .Values.arch }}
        spec:
          containers:
            - name: check-links-script
              image: '{{ include "docker-uri" (dict "environment" .Values.environment "app" "ckan" "files" $.Files) }}'
              workingDir: /app/check-links
              imagePullPolicy: Always
              command: [ "bash", "-c", ". chart/check_links-sort-upload.sh" ]
              env:
                {{- include "check-links.environment-variables" . | nindent 16 }}
              volumeMounts:
                - name: check-links-output
                  mountPath: /check_links
                - name: check-links-sort-upload-script
                  mountPath: /app/check-links/chart
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
            - name: check-links-verbose-script
              image: '{{ include "docker-uri" (dict "environment" .Values.environment "app" "ckan" "files" $.Files) }}'
              workingDir: /app/check-links
              imagePullPolicy: Always
              command: [ "bash", "-c", "pip install -r check_links-requirements.txt && python check_links.py --output-dir=/check_links --verbose" ]
              env:
                {{- include "check-links.environment-variables" . | nindent 16 }}
              volumeMounts:
                - name: check-links-output
                  mountPath: /check_links
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 900
            runAsGroup: 900
            fsGroup: 900
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: check-links-sort-upload-script
              configMap:
                name: {{ $fullName }}-sort-upload-script
            - name: check-links-output
              emptyDir: {}
          {{- if eq "arm64" .Values.arch }}
          tolerations:
            - key: arch
              operator: Equal
              value: {{ .Values.arch }}
              effect: NoSchedule
          nodeSelector:
            kubernetes.io/arch: {{ .Values.arch }}
          {{- end }}
