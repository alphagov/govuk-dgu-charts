apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  # Load test configuration — dynamically editable via kubectl patch
  config.json: |
    {
      "stages": [
        {{- range .Values.stages }}
        { "duration": "{{ .duration }}", "target": {{ .target }} },
        {{- end }}
      ],
      "baseUrl": "{{ .Values.baseUrl | default "https://www.staging.data.gov.uk" }}",
      "apiUrl": "{{ .Values.apiUrl | default "https://ckan.eks.staging.govuk.digital" }}",
      "thresholds": {
        "http_req_duration{type:homepage}": "p(95)<2000",
        "http_req_duration{type:search}": "p(95)<2000",
        "http_req_duration{type:dataset}": "p(95)<2000",
        "http_req_duration{type:api}": "p(95)<3000",
        "errors": "rate<0.01"
      },
      "searchQuery": "{{ .Values.searchQuery | default "climate" }}",
      "apiQuery": "{{ .Values.apiQuery | default "climate" }}",
      "apiRows": {{ .Values.apiRows | default 5 }},
      "endpoints": [
        {
          "name": "homepage",
          "path": "/",
          "thresholdMs": 2000
        },
        {
          "name": "search",
          "path": "/search?q={{ .Values.searchQuery | default "climate" }}",
          "thresholdMs": 2000
        },
        {
          "name": "dataset",
          "path": "/dataset",
          "thresholdMs": 2000
        }
      ]
    }

  script.js: |
    // chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate } from 'k6/metrics';

    const errorRate = new Rate('errors');

    // Configuration from environment variables (set by Job via kubectl patch)
    // Defaults read from config.json in ConfigMap
    const BASE_URL = __ENV.BASE_URL || 'https://www.staging.data.gov.uk';
    const API_URL = __ENV.API_URL || 'https://ckan.eks.staging.govuk.digital';
    const SEARCH_QUERY = __ENV.SEARCH_QUERY || 'climate';
    const API_QUERY = __ENV.API_QUERY || 'climate';
    const API_ROWS = parseInt(__ENV.API_ROWS) || 5;

    // Thresholds can be overridden via environment variables
    const HOMEPAGE_THRESHOLD = parseInt(__ENV.HOMEPAGE_THRESHOLD_MS) || 2000;
    const SEARCH_THRESHOLD = parseInt(__ENV.SEARCH_THRESHOLD_MS) || 2000;
    const DATASET_THRESHOLD = parseInt(__ENV.DATASET_THRESHOLD_MS) || 2000;
    const API_THRESHOLD = parseInt(__ENV.API_THRESHOLD_MS) || 3000;
    const ERROR_RATE_THRESHOLD = parseFloat(__ENV.ERROR_RATE_THRESHOLD) || 0.01;

    export const options = {
      stages: [
        {{- range .Values.stages }}
        { duration: '{{ .duration }}', target: {{ .target }} },
        {{- end }}
      ],
      thresholds: {
        'http_req_duration{type:homepage}': [`p(95)<${HOMEPAGE_THRESHOLD}`],
        'http_req_duration{type:search}':   [`p(95)<${SEARCH_THRESHOLD}`],
        'http_req_duration{type:dataset}':  [`p(95)<${DATASET_THRESHOLD}`],
        'http_req_duration{type:api}':      [`p(95)<${API_THRESHOLD}`],
        'errors': [`rate<${ERROR_RATE_THRESHOLD}`],
      },
    };

    export default function () {
      let res;

      // --- Test 1: Homepage ---
      res = http.get(`${BASE_URL}/`, {
        tags: { type: 'homepage' },
      });
      check(res, {
        'homepage: status is 200': (r) => r.status === 200,
        'homepage: loads in <2s':  (r) => r.timings.duration < HOMEPAGE_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 2: Search ---
      res = http.get(`${BASE_URL}/search?q=${SEARCH_QUERY}`, {
        tags: { type: 'search' },
      });
      check(res, {
        'search: status is 200': (r) => r.status === 200,
        'search: loads in <2s':  (r) => r.timings.duration < SEARCH_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 3: Dataset listing ---
      res = http.get(`${BASE_URL}/dataset`, {
        tags: { type: 'dataset' },
      });
      check(res, {
        'dataset: status is 200': (r) => r.status === 200,
        'dataset: loads in <2s':  (r) => r.timings.duration < DATASET_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 4: CKAN API ---
      res = http.get(`${API_URL}/api/3/action/package_search?q=${API_QUERY}&rows=${API_ROWS}`, {
        tags: { type: 'api' },
      });
      check(res, {
        'api: status is 200':    (r) => r.status === 200,
        'api: loads in <3s':     (r) => r.timings.duration < API_THRESHOLD,
        'api: returns results':  (r) => {
          try {
            return JSON.parse(r.body).result.count > 0;
          } catch (e) {
            return false;
          }
        },
      });
      errorRate.add(res.status !== 200);
      sleep(1);
    }
