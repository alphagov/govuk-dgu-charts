apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  script.js: |
    // chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    // Configuration flow: values.yaml (snake_case) → job.yaml (converts to ENV vars) → script.js
    // Naming: job.yaml sets DATAGOVUK_URL, CKAN_URL, HOMEPAGE_THRESHOLD_MS, etc.
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate } from 'k6/metrics';

    const errorRate = new Rate('errors');

    // All configuration from pod environment variables — visible via kubectl describe pod
    // URLs are explicit and transparent for full control
    const DATAGOVUK_URL = __ENV.DATAGOVUK_URL;
    const CKAN_URL = __ENV.CKAN_URL;
    const SEARCH_QUERY = __ENV.SEARCH_QUERY || 'climate';
    const CKAN_QUERY = __ENV.CKAN_QUERY || 'climate';
    const CKAN_ROWS = parseInt(__ENV.CKAN_ROWS) || 5;

    // Load test stage configuration — all configurable at runtime
    const VUS = parseInt(__ENV.VUS) || 100;
    const WARMUP_DURATION = __ENV.WARMUP_DURATION || '5m';
    const RAMP_DURATION = __ENV.RAMP_DURATION || '10m';
    const SOAK_DURATION = __ENV.SOAK_DURATION || '15m';

    // Response time thresholds (milliseconds) — configurable at runtime
    const HOMEPAGE_THRESHOLD = parseInt(__ENV.HOMEPAGE_THRESHOLD_MS) || 2000;
    const SEARCH_THRESHOLD = parseInt(__ENV.SEARCH_THRESHOLD_MS) || 2000;
    const DATASET_THRESHOLD = parseInt(__ENV.DATASET_THRESHOLD_MS) || 2000;
    const CKAN_API_THRESHOLD = parseInt(__ENV.CKAN_API_THRESHOLD_MS) || 3000;
    const ERROR_RATE_THRESHOLD = parseFloat(__ENV.ERROR_RATE_THRESHOLD) || 0.01;

    export const options = {
      stages: [
        { duration: WARMUP_DURATION, target: 1 },
        { duration: RAMP_DURATION,   target: VUS },
        { duration: SOAK_DURATION,   target: VUS },
        { duration: WARMUP_DURATION, target: 0 },
      ],
      thresholds: {
        'http_req_duration{type:homepage}': [`p(95)<${HOMEPAGE_THRESHOLD}`],
        'http_req_duration{type:search}':   [`p(95)<${SEARCH_THRESHOLD}`],
        'http_req_duration{type:dataset}':  [`p(95)<${DATASET_THRESHOLD}`],
        'http_req_duration{type:ckan_api}': [`p(95)<${CKAN_API_THRESHOLD}`],
        'errors': [`rate<${ERROR_RATE_THRESHOLD}`],
      },
    };

    export default function () {
      let res;

      // --- Test 1: Data.gov.uk Homepage ---
      res = http.get(`${DATAGOVUK_URL}/`, {
        tags: { type: 'homepage' },
      });
      check(res, {
        'homepage: status is 200': (r) => r.status === 200,
        'homepage: loads in <2s':  (r) => r.timings.duration < HOMEPAGE_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 2: Data.gov.uk Search ---
      res = http.get(`${DATAGOVUK_URL}/search?q=${SEARCH_QUERY}`, {
        tags: { type: 'search' },
      });
      check(res, {
        'search: status is 200': (r) => r.status === 200,
        'search: loads in <2s':  (r) => r.timings.duration < SEARCH_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      if (res.status !== 200) {
        console.log(`[search FAIL] status=${res.status} body=${(res.body || '').substring(0, 200)}`);
      }
      sleep(1);

      // --- Test 3: Data.gov.uk Dataset listing ---
      // Note: Data.gov.uk dataset pages depend on CKAN API calls
      res = http.get(`${CKAN_URL}/dataset`, {
        tags: { type: 'dataset' },
      });
      check(res, {
        'dataset: status is 200': (r) => r.status === 200,
        'dataset: loads in <2s':  (r) => r.timings.duration < DATASET_THRESHOLD,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 4: CKAN API direct call ---
      res = http.get(`${CKAN_URL}/api/3/action/package_search?q=${CKAN_QUERY}&rows=${CKAN_ROWS}`, {
        tags: { type: 'ckan_api' },
      });
      check(res, {
        'ckan_api: status is 200': (r) => r.status === 200,
        'ckan_api: loads in <3s':  (r) => r.timings.duration < CKAN_API_THRESHOLD,
        'api: returns results':  (r) => {
          try {
            return JSON.parse(r.body).result.count > 0;
          } catch (e) {
            return false;
          }
        },
      });
      errorRate.add(res.status !== 200);
      sleep(1);
    }
