apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  script.js: |
    // chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Rate } from 'k6/metrics';

    const errorRate = new Rate('errors');

    const BASE_URL = __ENV.TARGET_URL || 'https://www.staging.data.gov.uk';
    const API_URL  = __ENV.API_URL   || 'https://ckan.eks.staging.govuk.digital';

    export const options = {
      stages: [
        {{- range .Values.stages }}
        { duration: '{{ .duration }}', target: {{ .target }} },
        {{- end }}
      ],
      thresholds: {
        // 95% of requests must complete below 2 seconds
        'http_req_duration{type:homepage}': ['p(95)<2000'],
        'http_req_duration{type:search}':   ['p(95)<2000'],
        'http_req_duration{type:dataset}':  ['p(95)<2000'],
        'http_req_duration{type:api}':      ['p(95)<3000'],
        // Overall error rate must stay below 1%
        'errors': ['rate<0.01'],
      },
    };

    export default function () {
      let res;

      // --- Test 1: Homepage ---
      res = http.get(`${BASE_URL}/`, {
        tags: { type: 'homepage' },
      });
      check(res, {
        'homepage: status is 200': (r) => r.status === 200,
        'homepage: loads in <2s':  (r) => r.timings.duration < 2000,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 2: Dataset Search ---
      res = http.get(`${BASE_URL}/search?q=climate`, {
        tags: { type: 'search' },
      });
      check(res, {
        'search: status is 200': (r) => r.status === 200,
        'search: loads in <2s':  (r) => r.timings.duration < 2000,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 3: Dataset listing page ---
      res = http.get(`${BASE_URL}/dataset`, {
        tags: { type: 'dataset' },
      });
      check(res, {
        'dataset: status is 200': (r) => r.status === 200,
        'dataset: loads in <2s':  (r) => r.timings.duration < 2000,
      });
      errorRate.add(res.status !== 200);
      sleep(1);

      // --- Test 4: CKAN API ---
      res = http.get(`${API_URL}/api/3/action/package_search?q=climate&rows=5`, {
        tags: { type: 'api' },
      });
      check(res, {
        'api: status is 200':    (r) => r.status === 200,
        'api: loads in <3s':     (r) => r.timings.duration < 3000,
        'api: returns results':  (r) => JSON.parse(r.body).result.count > 0,
      });
      errorRate.add(res.status !== 200);
      sleep(1);
    }
