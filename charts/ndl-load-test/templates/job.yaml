apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-k6
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  annotations:
    # Ensures ArgoCD recreates the job on every sync, allowing team to re-run the test
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  # Do not retry on failure — a failed run should be investigated, not retried silently
  backoffLimit: 0
  # Automatically clean up the job pod after this many seconds
  # Gives the team time to view logs before the pod is removed
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: {{ .Values.image }}
          args:
            - run
            - /scripts/script.js
            - --out
            - json=/tmp/results.json
          env:
            - name: TARGET_URL
              value: {{ .Values.targetUrl | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-script
