apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-k6
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  # Job starts suspended — unsuspend manually to trigger the test
  # Avoids ArgoCD sync timeout on long-running (35 min) tests
  suspend: {{ .Values.suspended }}
  # Do not retry on failure — a failed run should be investigated, not retried silently
  backoffLimit: 0
  # Automatically clean up the job pod after this many seconds
  # Gives the team time to view logs before the pod is removed
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 12345
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: {{ .Values.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - run
            - /scripts/script.js
            - --out
            - json=/tmp/results.json
            {{- if .Values.prometheus.remoteWriteUrl }}
            - --out
            - experimental-prometheus-rw
            {{- end }}
          env:
            - name: TARGET_URL
              value: {{ .Values.targetUrl | quote }}
            - name: API_URL
              value: {{ .Values.apiUrl | quote }}
            {{- if .Values.prometheus.remoteWriteUrl }}
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: {{ .Values.prometheus.remoteWriteUrl | quote }}
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: {{ .Values.prometheus.trendStats | quote }}
            - name: K6_PROMETHEUS_RW_STALE_MARKERS_ENABLED
              value: "true"
            {{- end }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-script
